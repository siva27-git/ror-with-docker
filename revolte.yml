revolte:
  version: '1.0'
  project: May14
  appName: ror-with-docker
  workflow:
    developerWorkflow:
      enabled: true
  env:
    staging:
      branch: staging
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: bundle exec rails server -b 0.0.0.0 -p 8080
          properties:
            health: /health
            port: 8080
            loadBalancerMode: dedicated
            variables:
              BASE_URL: /api/v1
              AWS_REGION: '#{storage_bucket_service.region}'
              AWS_ACCESS_KEY_ID: '#{storage_bucket_service.accessKeyId}'
              AWS_SECRET_ACCESS_KEY: '#{storage_bucket_service.secretAccessKeyId}'
              AWS_BUCKET_NAME: ror-test-s
          specifications:
            cpu: 2
            memory: 1
            storage: 30
        rid_3:
          type: STORAGE_BUCKET
          name: storage_bucket_service
          configurations:
            bucketName: ror-test-s
            versioningStatus: enabled
            public: false
        rid_2:
          type: CACHE
          name: cache
          specifications:
            cpu: 2
            memory: 0.5
    qa:
      branch: develop
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: bundle exec rails server -b 0.0.0.0 -p 8080
          properties:
            health: /health
            port: 8080
            loadBalancerMode: dedicated
            variables:
              BASE_URL: /api/v1
              AWS_REGION: '#{storage_bucket_service.region}'
              AWS_ACCESS_KEY_ID: '#{storage_bucket_service.accessKeyId}'
              AWS_SECRET_ACCESS_KEY: '#{storage_bucket_service.secretAccessKeyId}'
              AWS_BUCKET_NAME: ror-test-d
              CACHE_HOST: '#{cache.cacheHost}'
              CACHE_PORT: '#{cache.cachePort}'
              CACHE_PASSWORD: '#{cache.cachePassword}'
          specifications:
            cpu: 2
            memory: 1
            storage: 30
        rid_3:
          type: STORAGE_BUCKET
          name: storage_bucket_service
          configurations:
            bucketName: ror-test-d
            versioningStatus: enabled
            public: false
        rid_2:
          type: CACHE
          name: cache
          specifications:
            cpu: 2
            memory: 0.5
    production:
      branch: main
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: bundle exec rails server -b 0.0.0.0 -p 8080
          properties:
            health: /health
            port: 8080
            loadBalancerMode: dedicated
            variables:
              BASE_URL: /api/v1
              AWS_REGION: '#{storage_bucket_service.region}'
              AWS_ACCESS_KEY_ID: '#{storage_bucket_service.accessKeyId}'
              AWS_SECRET_ACCESS_KEY: '#{storage_bucket_service.secretAccessKeyId}'
              AWS_BUCKET_NAME: ror-test-p
          specifications:
            cpu: 2
            memory: 1
            storage: 30
            autoScaling:
              replica:
                min: 1
                max: 1
              utilization:
                cpu:
                  target: 70
                memory:
                  target: 70
              behavior:
                scaleDown:
                  stabilizationWindow: 300
        rid_3:
          type: STORAGE_BUCKET
          name: storage_bucket_service
          configurations:
            bucketName: ror-test-p
            versioningStatus: enabled
            public: false
        rid_2:
          type: CACHE
          name: cache
          specifications:
            cpu: 2
            memory: 0.5
            replica: 1
    preview:
      services:
        rid_1:
          type: WEB_SERVICE
          name: web_service
          entryPoint: index.js
          properties:
            health: /health
            port: 8080
            loadBalancerMode: dedicated
            variables:
              BASE_URL: /api/v1
              AWS_REGION: '#{storage_bucket_service.region}'
              AWS_ACCESS_KEY_ID: '#{storage_bucket_service.accessKeyId}'
              AWS_SECRET_ACCESS_KEY: '#{storage_bucket_service.secretAccessKeyId}'
              AWS_BUCKET_NAME: ror-test
          specifications:
            cpu: 2
            memory: 1
            storage: 30
        rid_3:
          type: STORAGE_BUCKET
          name: storage_bucket_service
          configurations:
            bucketName: ror-test
            versioningStatus: enabled
            public: false
        rid_2:
          type: CACHE
          name: cache
          specifications:
            cpu: 2
            memory: 0.5
